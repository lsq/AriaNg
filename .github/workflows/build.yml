name: Node CI

on: [push]

jobs:
  build:
    permissions:
      pull-requests: write # for writing comments
      issues: write # for writing comments
      contents: write # for creating a release
      id-token: write # Required for OIDC

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6
        with:
          # Necessary to find the commits included in the release
          fetch-depth: 0
      # 使用 pnpm 官方 action
      # - name: Setup pnpm
      #   uses: pnpm/action-setup@v5
      #   with:
      #     run_install: false
      - name: Setup Node
        uses: actions/setup-node@v6 # v6.0.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - name: Update npm for publishing
        run: npm install -g npm@latest && npm install gulp@latest -g
      # 安装依赖
      - name: Install dependencies
        run: |
          # pnpm i --frozen-lockfile
          npm install

      # 构建 React 应用
      - name: Build
        run: |
          # pnpm build
          gulp clean build-bundle
          cd dist && ls ./
          7z a -mx=9 ../AriaNg-DailyBuild.7z *
      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: AriaNg-DailyBuild
          path:
            dist
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        # if: ${{ steps.build.outputs.uploadable == 1 }}
        with:
          files: |
            AriaNg-DailyBuild.7z
      #      ./DeviceTree.zip
      #    name: TWRP_Device_Tree-${{ github.run_id }}
          name: latest
      #    tag_name: ${{ github.run_id }}
          tag_name: latest
      #    body: DeviceTree for twrp
          body_path: support Download Url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
